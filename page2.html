<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0d0d0d;
  color: white;
  text-align: center;
}

.container {
  padding: 30px 15px;
  max-width: 900px;
  margin: auto;
}

h2 {
  margin-bottom: 25px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
}

.grid img {
  width: 100%;
  border-radius: 10px;
  transition: 0.3s;
}

.grid img:hover {
  transform: scale(1.05);
}

/* Desktop */
@media (min-width: 768px) {
  .grid {
    grid-template-columns: repeat(4, 1fr);
  }
}
</style>
</head>

<body>

<div class="container">
  <h2>See What’s Possible</h2>

  <div class="grid">
    <img src="img1.jpg">
    <img src="img2.jpg">
    <img src="img3.jpg">
    <img src="img4.jpg">
  </div>
</div>

</body>
</html>
